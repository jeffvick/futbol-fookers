<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Minimal Test</title>
</head>
<body>
    <h1>Firebase Minimal Test</h1>
    <p id="status">Initializing Firebase...</p>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyByqr9GCcjQHTCCbhRN8fs7eTOezU1Ldvc",
            authDomain: "fifa-world-fuck.firebaseapp.com",
            databaseURL: "https://fifa-world-fuck-default-rtdb.firebaseio.com",
            projectId: "fifa-world-fuck",
            storageBucket: "fifa-world-fuck.firebasestorage.app",
            messagingSenderId: "839702256039",
            appId: "1:839702256039:web:e342e3b66fe1e331107e82"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusElement = document.getElementById('status');

        statusElement.textContent = "Firebase initialized.";

        // Test Realtime Database connection by listening to a path
        // We'll listen to your 'pool' ref, but not process any data to keep it minimal.
        const poolRef = db.ref('pool');
        poolRef.on('value', snapshot => {
            statusElement.textContent = "Firebase Realtime Database connected and received data (or null).";
            console.log("Firebase Realtime Database data received:", snapshot.val());
        }, error => {
            statusElement.textContent = `Firebase Realtime Database error: ${error.message}`;
            console.error("Firebase Realtime Database Error:", error);
        });

        // Also listen for connection status to Firebase
        db.ref('.info/connected').on('value', snap => {
            if (snap.val()) {
                console.log("Connected to Firebase.");
            } else {
                console.warn("Disconnected from Firebase.");
            }
        });

        console.log("Script execution finished.");
    </script>
</body>
</html>
